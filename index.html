// ==================== BACKGROUND PARTICLES ====================
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - .5) * .4,
      vy: (Math.random() - .5) * .4,
      r: Math.random() * 1.5 + .5,
      a: Math.random() * .4 + .1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (let p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,229,255,${p.a})`;
      ctx.fill();
    }
    // draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 80) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(255,64,129,${.06 * (1 - d/80)})`;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ==================== STATE ====================
let scores = {};        // { charId: number }
let currentQ = 0;
let resultChar = null;

// DOM refs
const $start = document.getElementById('screen-start');
const $quiz = document.getElementById('screen-quiz');
const $result = document.getElementById('screen-result');
const $qText = document.getElementById('q-text');
const $opts = document.getElementById('options-container');
const $progress = document.getElementById('progress-bar');
const $qNum = document.getElementById('q-num-label');
const $qPct = document.getElementById('q-progress-text');
const $posterModal = document.getElementById('poster-modal');
const $posterCanvas = document.getElementById('poster-canvas');

// ==================== SCREEN SWITCHER ====================
function showScreen(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
}

// ==================== START ====================
function startQuiz() {
  scores = {};
  currentQ = 0;
  resultChar = null;
  showScreen($quiz);
  renderQuestion();
}

// ==================== RENDER QUESTION ====================
function renderQuestion() {
  if (currentQ >= questions.length) {
    finishQuiz();
    return;
  }
  const q = questions[currentQ];
  $qNum.textContent = `第 ${currentQ + 1} / ${questions.length} 题`;
  const pct = Math.round((currentQ / questions.length) * 100);
  $progress.style.width = pct + '%';
  $qPct.textContent = pct + '%';
  $qText.textContent = q.q;

  const letters = ['A', 'B', 'C', 'D'];
  $opts.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn" onclick="pickAnswer(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span class="opt-text">${opt.text}</span>
    </button>
  `).join('');
}

function pickAnswer(optIdx) {
  const q = questions[currentQ];
  const selectedChars = q.options[optIdx].chars;
  selectedChars.forEach(id => {
    scores[id] = (scores[id] || 0) + 1;
  });
  currentQ++;

  // animate progress bar
  const pct = Math.round((currentQ / questions.length) * 100);
  $progress.style.width = pct + '%';
  $qPct.textContent = pct + '%';

  // short delay then next
  setTimeout(() => {
    renderQuestion();
  }, 150);
}

// ==================== FINISH ====================
function finishQuiz() {
  // find top character
  let topId = null, topScore = -1;
  const ids = characters.map(c => c.id);
  for (let id of ids) {
    const s = scores[id] || 0;
    if (s > topScore) { topScore = s; topId = id; }
  }
  resultChar = characters.find(c => c.id === topId);

  // render result
  const c = resultChar;
  $result.innerHTML = `
    <div class="result-card">
      <div class="result-avatar">${c.emoji}</div>
      <div class="result-name">${c.name}</div>
      <div style="font-size:14px;color:var(--dim);">${c.aka}</div>
      <div class="result-anime">
        出自：${c.anime} <span style="font-size:12px;">(${c.animeJa})</span><br>
        Bangumi 评分 <span class="rating">${c.rating}</span> · 排名第 <span class="rating">${c.rank}</span>
      </div>
      <div class="result-traits">
        ${c.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
      </div>
      <div class="result-desc">${c.desc}</div>
      <div class="result-quote">${c.quote}</div>
      <div class="result-actions">
        <button class="btn btn-primary btn-sm" onclick="showPoster()">🎨 生成海报</button>
        <button class="btn btn-outline btn-sm" onclick="retakeQuiz()">🔄 重新测试</button>
      </div>
    </div>
  `;
  showScreen($result);
}

function retakeQuiz() {
  startQuiz();
}

// ==================== POSTER ====================
function showPoster() {
  if (!resultChar) return;
  const c = resultChar;
  const canvas = $posterCanvas;
  const dpr = 2;
  const w = 375, h = 600;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // bg gradient
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(.5, '#141430');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // decorative circles
  ctx.globalAlpha = .08;
  ctx.fillStyle = c.color;
  ctx.beginPath(); ctx.arc(300, 100, 140, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(50, 480, 100, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // top accent line
  ctx.fillStyle = c.color;
  ctx.fillRect(0, 0, w, 4);

  // emoji
  ctx.font = '64px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(c.emoji, w/2, 100);

  // name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(c.name, w/2, 152);

  // aka
  ctx.fillStyle = '#888';
  ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(c.aka, w/2, 176);

  // divider
  ctx.strokeStyle = c.color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = .5;
  ctx.beginPath(); ctx.moveTo(60, 196); ctx.lineTo(w-60, 196); ctx.stroke();
  ctx.globalAlpha = 1;

  // anime info
  ctx.fillStyle = '#aaa';
  ctx.font = '13px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(`出自《${c.anime}》(${c.animeJa})`, w/2, 220);
  ctx.fillStyle = c.color;
  ctx.font = 'bold 15px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(`Bangumi 评分 ${c.rating} · 排名 #${c.rank}`, w/2, 244);

  // traits
  let tx = 28, ty = 272;
  ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
  for (let t of c.traits) {
    const tw = ctx.measureText(t).width + 20;
    if (tx + tw > w - 28) { tx = 28; ty += 30; }
    ctx.fillStyle = 'rgba(255,255,255,.08)';
    ctx.beginPath();
    const rx = tx, ry = ty - 14, rw = tw, rh = 26;
    ctx.moveTo(rx + 14, ry);
    ctx.lineTo(rx + rw - 14, ry);
    ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + 14);
    ctx.lineTo(rx + rw, ry + rh - 14);
    ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - 14, ry + rh);
    ctx.lineTo(rx + 14, ry + rh);
    ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - 14);
    ctx.lineTo(rx, ry + 14);
    ctx.quadraticCurveTo(rx, ry, rx + 14, ry);
    ctx.fill();
    ctx.fillStyle = c.color;
    ctx.fillText(t, tx + tw/2, ty + 4);
    tx += tw + 8;
  }

  // description
  ctx.fillStyle = '#ccc';
  ctx.font = '13px "PingFang SC","Microsoft YaHei",sans-serif';
  const descLines = wrapText(ctx, c.desc, w - 56, 13);
  let dy = ty + 42;
  for (let line of descLines) {
    ctx.fillText(line, w/2, dy);
    dy += 22;
  }

  // quote
  dy += 8;
  ctx.fillStyle = c.color;
  ctx.globalAlpha = .3;
  ctx.fillRect(40, dy - 10, w - 80, 1);
  ctx.globalAlpha = 1;
  ctx.font = 'italic 14px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = c.color;
  const quoteLines = wrapText(ctx, c.quote, w - 80, 14);
  dy += 22;
  for (let line of quoteLines) {
    ctx.fillText(line, w/2, dy);
    dy += 22;
  }

  // bottom
  ctx.fillStyle = '#555';
  ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('扫码测测你是哪部神作动漫的角色', w/2, h - 28);
  ctx.fillText('基于 Bangumi 番组计划评分前 50 动画', w/2, h - 12);

  // bottom accent
  ctx.fillStyle = c.color;
  ctx.fillRect(0, h - 4, w, 4);

  $posterModal.classList.add('show');
}

function wrapText(ctx, text, maxWidth, fontSize) {
  const words = text.split('');
  const lines = [];
  let current = '';
  for (let ch of words) {
    const test = current + ch;
    if (ctx.measureText(test).width > maxWidth && current.length > 0) {
      lines.push(current);
      current = ch;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function closePoster() {
  $posterModal.classList.remove('show');
}

// Long press to save — handled natively in WeChat
// In WeChat browser, long-pressing an img triggers the save menu.
// We render as canvas, so we need to convert and offer an img.
$posterCanvas.addEventListener('contextmenu', e => {
  // allow long press context menu in mobile
});

// For non-WeChat, add a download fallback
$posterCanvas.addEventListener('click', function() {
  // In WeChat, long press works natively on canvas elements
});

// ==================== INIT ====================
showScreen($start);
</script>
