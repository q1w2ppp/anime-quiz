<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>测测你的二次元恋爱人格 | 25位热门动漫角色</title>
<style>
  :root {
    --bg: #0d0814;
    --card: #1a1028;
    --card2: #221838;
    --text: #e8ddf5;
    --dim: #9a8aaf;
    --pink: #ff6b9d;
    --purple: #b388ff;
    --gold: #ffd740;
    --cyan: #84ffff;
    --rose: #ff80ab;
    --border: #2a1a3a;
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:var(--bg); color:var(--text);
    font-family:var(--font); font-size:15px;
    -webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased;
    user-select:none; -webkit-user-select:none;
  }

  /* ========== BG PARTICLES ========== */
  #bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }

  /* ========== APP SHELL ========== */
  #app { position:relative; z-index:1; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }

  /* ========== SCREENS ========== */
  .screen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 20px; overflow-y:auto;
    opacity:0; pointer-events:none;
    transition:opacity .35s ease;
    -webkit-overflow-scrolling:touch;
  }
  .screen.active { opacity:1; pointer-events:auto; }

  /* ========== START SCREEN ========== */
  .logo-icon { font-size:64px; margin-top:12px; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .title {
    font-size:28px; font-weight:900; text-align:center;
    background:linear-gradient(135deg, var(--pink), var(--purple), var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1.3; margin:8px 0;
  }
  .subtitle { font-size:14px; color:var(--dim); text-align:center; line-height:1.6; margin:4px 0 16px; }
  .love-badge {
    display:inline-flex; align-items:center; gap:8px;
    padding:8px 16px; border-radius:20px;
    background:rgba(255,107,157,.1); border:1px solid rgba(255,107,157,.25);
    font-size:12px; color:var(--pink); margin-bottom:20px;
  }
  .love-badge .dot { width:6px; height:6px; border-radius:50%; background:var(--pink); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* ========== BUTTONS ========== */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 32px; border-radius:28px; border:none;
    font-size:16px; font-weight:700; cursor:pointer;
    font-family:var(--font);
    transition:transform .15s ease, box-shadow .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active { transform:scale(.96); }
  .btn-primary {
    background:linear-gradient(135deg, var(--pink), #e040fb);
    color:#fff; box-shadow:0 4px 24px rgba(255,107,157,.35);
  }
  .btn-outline {
    background:transparent; color:var(--pink);
    border:1.5px solid rgba(255,107,157,.4);
  }
  .btn-sm { padding:10px 22px; font-size:14px; }

  /* ========== QUIZ SCREEN ========== */
  .quiz-header { width:100%; max-width:420px; margin-bottom:20px; }
  .quiz-topbar {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px;
  }
  .question-number { font-size:13px; color:var(--pink); font-weight:600; }
  .progress-bar-outer {
    width:100%; height:5px; border-radius:3px;
    background:rgba(255,255,255,.06); overflow:hidden;
  }
  .progress-bar-inner {
    height:100%; border-radius:3px;
    background:linear-gradient(90deg, var(--pink), var(--purple));
    transition:width .3s ease;
  }
  .question-text {
    width:100%; max-width:420px;
    font-size:20px; font-weight:700; text-align:center;
    line-height:1.5; margin-bottom:28px;
    background:linear-gradient(180deg, #fff, #ddd);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .options-list { width:100%; max-width:420px; display:flex; flex-direction:column; gap:10px; }
  .option-btn {
    width:100%; padding:16px 18px; border-radius:var(--radius);
    background:var(--card); border:1.5px solid var(--border);
    color:var(--text); font-size:15px; text-align:left;
    cursor:pointer; font-family:var(--font);
    transition:all .15s ease;
    -webkit-tap-highlight-color:transparent;
    line-height:1.4;
  }
  .option-btn:active { transform:scale(.98); }
  .option-btn.selected {
    border-color:var(--pink);
    background:rgba(255,107,157,.08);
    color:var(--pink);
  }
  .option-letter {
    display:inline-block; width:22px; height:22px; border-radius:50%;
    background:rgba(255,255,255,.06); font-size:12px; font-weight:700;
    text-align:center; line-height:22px; margin-right:10px;
    color:var(--dim);
  }
  .option-btn.selected .option-letter { background:var(--pink); color:#fff; }

  /* ========== RESULT SCREEN ========== */
  .result-card {
    width:100%; max-width:380px;
    background:var(--card); border-radius:20px;
    border:1px solid var(--border);
    padding:28px 20px;
    display:flex; flex-direction:column; align-items:center;
    gap:12px; margin-top:8px;
  }
  .result-avatar { font-size:72px; }
  .result-name {
    font-size:26px; font-weight:900; text-align:center;
    background:linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .result-anime { font-size:13px; color:var(--dim); text-align:center; line-height:1.6; }
  .result-anime b { color:var(--text); }
  .result-traits { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .trait-tag {
    padding:5px 12px; border-radius:14px;
    background:rgba(255,107,157,.1); color:var(--pink);
    font-size:12px; font-weight:600;
  }
  .result-type {
    font-size:14px; color:var(--gold); font-weight:700;
    padding:6px 16px; border-radius:14px;
    background:rgba(255,215,64,.08); border:1px solid rgba(255,215,64,.2);
  }
  .result-desc { font-size:14px; color:var(--dim); text-align:center; line-height:1.7; }
  .result-quote {
    font-size:15px; font-style:italic; color:var(--purple);
    text-align:center; padding:10px 0;
    border-top:1px solid var(--border); border-bottom:1px solid var(--border);
    width:100%;
  }
  .result-match {
    font-size:13px; color:var(--dim); text-align:center;
    background:rgba(255,255,255,.03); padding:10px 16px;
    border-radius:12px; width:100%;
  }
  .result-match b { color:var(--pink); }
  .result-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }

  /* ========== POSTER MODAL ========== */
  #poster-modal {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,.92); z-index:100;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:16px;
    opacity:0; pointer-events:none;
    transition:opacity .3s ease; padding:20px;
  }
  #poster-modal.show { opacity:1; pointer-events:auto; }
  #poster-canvas { max-width:90vw; max-height:65vh; border-radius:12px; box-shadow:0 4px 30px rgba(0,0,0,.6); }
  .poster-hint { font-size:13px; color:var(--dim); text-align:center; }
  .poster-hint .icon { font-size:18px; }

  /* ========== RESPONSIVE ========== */
  @media (min-width:480px) {
    .screen { padding:32px 28px; }
    .title { font-size:32px; }
    .question-text { font-size:22px; }
    .result-card { max-width:420px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">

  <!-- ===== START ===== -->
  <div class="screen active" id="screen-start">
    <div class="logo-icon">💘</div>
    <div class="title">测测你的<br>二次元恋爱人格</div>
    <div class="subtitle">
      30 道二次元情境题 · 25 位热门角色<br>
      找到和你恋爱风格最像的那个动漫人物
    </div>
    <div class="love-badge">
      <span class="dot"></span> 含：病娇 / 傲娇 / 直球 / 天然 / 冰山 …… 你属于哪一种？
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">💕 开始测试</button>
    <div style="font-size:12px;color:var(--dim);text-align:center;">约 6 分钟 · 30 题 · 25 种恋爱人格</div>
  </div>

  <!-- ===== QUIZ ===== -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <div class="quiz-topbar">
        <span class="question-number" id="q-num-label">第 1 / 30 题</span>
        <span id="q-progress-text" style="font-size:13px;color:var(--dim);">0%</span>
      </div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%;"></div>
      </div>
    </div>
    <div class="question-text" id="q-text"></div>
    <div class="options-list" id="options-container"></div>
  </div>

  <!-- ===== RESULT ===== -->
  <div class="screen" id="screen-result"></div>

</div>

<!-- ===== POSTER MODAL ===== -->
<div id="poster-modal">
  <canvas id="poster-canvas"></canvas>
  <div class="poster-hint"><span class="icon">👆</span> 长按图片保存到相册</div>
  <button class="btn btn-outline btn-sm" onclick="closePoster()">关闭</button>
</div>

<script>
// ==================== BG ====================
(function(){
  const c=document.getElementById('bg-canvas'),x=c.getContext('2d');
  let ps=[],w,h;
  function R(){w=c.width=innerWidth;h=c.height=innerHeight}
  R();addEventListener('resize',R);
  for(let i=0;i<45;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.8+.4,a:Math.random()*.3+.08});
  (function D(){
    x.clearRect(0,0,w,h);
    for(let p of ps){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`rgba(255,107,157,${p.a})`;x.fill()}
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){let dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<70){x.beginPath();x.moveTo(ps[i].x,ps[i].y);x.lineTo(ps[j].x,ps[j].y);x.strokeStyle=`rgba(179,136,255,${.05*(1-d/70)})`;x.stroke()}}
    requestAnimationFrame(D)
  })()
})();

// ==================== STATE ====================
let scores = {};
let currentQ = 0;
let resultChar = null;

const $start = document.getElementById('screen-start');
const $quiz = document.getElementById('screen-quiz');
const $result = document.getElementById('screen-result');
const $qText = document.getElementById('q-text');
const $options = document.getElementById('options-container');
const $qNum = document.getElementById('q-num-label');
const $qPct = document.getElementById('q-progress-text');
const $progress = document.getElementById('progress-bar');
const $posterModal = document.getElementById('poster-modal');
const $posterCanvas = document.getElementById('poster-canvas');

// ==================== SCREEN NAV ====================
function showScreen(screen) {
  [$start,$quiz,$result].forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
}

// ==================== QUIZ ====================
function startQuiz() {
  scores = {};
  characters.forEach(c => scores[c.id] = 0);
  currentQ = 0;
  showScreen($quiz);
  renderQuestion();
}

function renderQuestion() {
  if (currentQ >= questions.length) return finishQuiz();
  const q = questions[currentQ];
  $qNum.textContent = `第 ${currentQ + 1} / 30 题`;
  const pct = Math.round((currentQ / questions.length) * 100);
  $progress.style.width = pct + '%';
  $qPct.textContent = pct + '%';
  $qText.textContent = q.q;
  $options.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    const letters = ['A','B','C','D'];
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.text}`;
    btn.addEventListener('click', () => {
      // score
      opt.chars.forEach(id => {
        if (scores[id] !== undefined) scores[id]++;
      });
      currentQ++;
      // flash
      btn.classList.add('selected');
      setTimeout(() => {
        renderQuestion();
      }, 160);
    });
    $options.appendChild(btn);
  });
}

// ==================== FINISH ====================
function finishQuiz() {
  let topId = null, topScore = -1;
  characters.forEach(c => {
    const s = scores[c.id] || 0;
    if (s > topScore) { topScore = s; topId = c.id; }
  });
  resultChar = characters.find(c => c.id === topId);

  const c = resultChar;
  $result.innerHTML = `
    <div class="result-card">
      <div class="result-avatar">${c.emoji}</div>
      <div class="result-name">${c.name}</div>
      <div style="font-size:14px;color:var(--dim);">${c.aka}</div>
      <div class="result-type">💝 你的恋爱人格：${c.type}</div>
      <div class="result-anime">
        出自 <b>《${c.anime}》</b>（${c.animeJa}）
      </div>
      <div class="result-traits">
        ${c.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
      </div>
      <div class="result-desc">${c.desc}</div>
      <div class="result-quote">「${c.quote}」</div>
      <div class="result-match">${c.match}</div>
      <div class="result-actions">
        <button class="btn btn-primary btn-sm" onclick="showPoster()">🎨 生成海报</button>
        <button class="btn btn-outline btn-sm" onclick="retakeQuiz()">🔄 重新测试</button>
      </div>
    </div>
  `;
  showScreen($result);
}

function retakeQuiz() { startQuiz(); }

// ==================== POSTER ====================
function showPoster() {
  if (!resultChar) return;
  const c = resultChar;
  const canvas = $posterCanvas;
  const dpr = 2, w = 375, h = 620;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // bg
  const grad = ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,'#0d0814'); grad.addColorStop(.5,'#1a1030'); grad.addColorStop(1,'#0d0814');
  ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

  // hearts
  ctx.globalAlpha = .06;
  for (let i=0;i<12;i++) {
    const hx = Math.random()*w, hy = Math.random()*h, hs = 10+Math.random()*30;
    ctx.fillStyle = c.color;
    drawHeart(ctx, hx, hy, hs);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // top accent
  ctx.fillStyle = c.color; ctx.fillRect(0,0,w,4);

  // emoji
  ctx.font = '68px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(c.emoji, w/2, 95);

  // name
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(c.name, w/2, 150);

  // aka
  ctx.fillStyle = '#999'; ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(c.aka, w/2, 174);

  // type
  ctx.fillStyle = c.color; ctx.font = 'bold 15px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(`💝 ${c.type}`, w/2, 200);

  // divider
  ctx.strokeStyle = c.color; ctx.lineWidth = 1; ctx.globalAlpha = .4;
  ctx.beginPath(); ctx.moveTo(50,218); ctx.lineTo(w-50,218); ctx.stroke();
  ctx.globalAlpha = 1;

  // anime
  ctx.fillStyle = '#bbb'; ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(`出自《${c.anime}》(${c.animeJa})`, w/2, 240);

  // traits
  let tx=24, ty=264;
  ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
  for (let t of c.traits) {
    const tw = ctx.measureText(t).width + 18;
    if (tx+tw > w-24) { tx=24; ty+=28; }
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    roundRect(ctx, tx, ty-13, tw, 24, 12); ctx.fill();
    ctx.fillStyle = c.color; ctx.fillText(t, tx+tw/2, ty+4);
    tx += tw + 6;
  }

  // desc
  let dy = ty + 40;
  ctx.fillStyle = '#ccc'; ctx.font = '12.5px "PingFang SC","Microsoft YaHei",sans-serif';
  const descLines = wrapText(ctx, c.desc, w-48, 12.5);
  for (let line of descLines) { ctx.fillText(line, w/2, dy); dy += 20; }

  // quote
  dy += 8;
  ctx.fillStyle = c.color; ctx.globalAlpha = .25;
  ctx.fillRect(40, dy-8, w-80, 1);
  ctx.globalAlpha = 1;
  ctx.font = 'italic 13px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = c.color;
  const quoteLines = wrapText(ctx, `「${c.quote}」`, w-72, 13);
  dy += 18;
  for (let line of quoteLines) { ctx.fillText(line, w/2, dy); dy += 20; }

  // bottom
  dy = Math.max(dy+8, h-44);
  ctx.fillStyle = '#555'; ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('扫码测测你的二次元恋爱人格', w/2, dy);
  ctx.fillText('基于 25 位热门动漫角色 · 30 道情境测试题', w/2, dy+16);

  ctx.fillStyle = c.color; ctx.fillRect(0, h-4, w, 4);

  $posterModal.classList.add('show');
}

function drawHeart(ctx, x, y, s) {
  ctx.beginPath();
  const topY = y - s*0.35;
  ctx.moveTo(x, y + s*0.4);
  ctx.bezierCurveTo(x-s*1.2, y-s*0.3, x-s*0.6, y-s*0.5, x, topY);
  ctx.bezierCurveTo(x+s*0.6, y-s*0.5, x+s*1.2, y-s*0.3, x, y+s*0.4);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function wrapText(ctx, text, maxWidth, fontSize) {
  const lines = []; let cur = '';
  for (let ch of text) {
    if (ctx.measureText(cur+ch).width > maxWidth && cur.length>0) { lines.push(cur); cur = ch; }
    else cur += ch;
  }
  if (cur) lines.push(cur);
  return lines;
}

function closePoster() { $posterModal.classList.remove('show'); }

// ==================== INIT ====================
showScreen($start);
</script>
